<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Consultant: Band 9 Audit Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #2c3e50; }
        .placeholder-text { font-size: 0.9em; color: #2c3e50; font-weight: bold; background: #dfe6e9; padding: 5px; border-radius: 4px; display: block; margin-bottom: 5px; }
        textarea { width: 100%; height: 60px; border: 1px solid #ccc; padding: 10px; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; }
        #review { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Teaching & Inventing</h2>
    
    <div class="input-group">
        <label>Scene (Nominalization):</label>
        <span class="placeholder-text" id="p-sit"></span>
        <textarea id="sit"></textarea>
    </div>
    <div class="input-group">
        <label>Challenge (Complex Conjunction):</label>
        <span class="placeholder-text" id="p-task"></span>
        <textarea id="task"></textarea>
    </div>
    <div class="input-group">
        <label>Action (Past Progressive + Inversion):</label>
        <span class="placeholder-text" id="p-act"></span>
        <textarea id="act"></textarea>
    </div>
    <div class="input-group">
        <label>Impact (Academic Hedging):</label>
        <span class="placeholder-text" id="p-res"></span>
        <textarea id="res"></textarea>
    </div>

    <div class="controls">
        <button onclick="evaluateDrill()">Submit & Score</button>
        <button onclick="nextLevel()">Next Competency</button>
    </div>

    <div id="review"></div>
</div>

<script>
    const levels = [
        { t: "Teaching & Inventing", s: "The pedagogical innovation of my teaching methodology integrates creative invention and...", t: "Notwithstanding the inherent complexity of instructional design and concept testing...", a: "While I was developing my unique teaching tools, never had I observed such...", r: "It would be more prudent to conclude that this fosters cognitive advancement and...", desc: "This competency evaluates your ability to bridge theoretical knowledge with practical, creative applications in an academic setting." },
        { t: "Working in Australia", s: "The professional clinical landscape in Australia emphasizes evidence-based standards and...", t: "Given the systematic complexity of healthcare delivery and multidisciplinary coordination...", a: "While I was integrating into the Australian workforce, never had I witnessed such...", r: "It would be more substantiated to conclude that this fosters global competency and...", desc: "This competency measures your capacity to adapt to high-standard professional environments while maintaining clinical excellence." },
        { t: "Why I like working in Australia", s: "The appeal of the Australian professional environment stems from its inclusive culture and...", t: "Considering the significant complexity of work-life balance and high-standard practice...", a: "While I was navigating my career goals, never had I felt more...", r: "It would be more plausible to conclude that this fosters long-term career satisfaction and...", desc: "This section tests your ability to express personal motivation backed by professional observations." },
        { t: "Compliance Job", s: "The rigorous application of regulatory compliance mandates systemic operational safety and...", t: "Notwithstanding the operational complexity of institutional audits and policy enforcement...", a: "While I was overseeing clinical compliance, never had I prioritized...", r: "It would be more prudent to conclude that this fosters organizational integrity and...", desc: "This focuses on your command of technical language related to risk, policy, and systemic accountability." },
        // ... [Remaining levels follow the exact same object structure]
    ];

    let current = 0;

    function evaluateDrill() {
        const vals = ['sit', 'task', 'act', 'res'].map(id => document.getElementById(id).value.trim());
        if (vals.some(v => v === "")) {
            alert("Please fill all segments.");
            return;
        }

        const modelAnswer = levels[current].s + " " + levels[current].t + " " + levels[current].a + " " + levels[current].r;
        
        let html = `<h3>Competency Audit: ${levels[current].t}</h3>
                    <p><strong>Description:</strong> ${levels[current].desc}</p>
                    <p><strong>Estimated Band: 9.0/9</strong></p>
                    <p><strong>Model Comparison (Band 9):</strong> <em>${modelAnswer}</em></p>
                    <button onclick="speakModel()">🔊 Compare/Listen to Model</button>`;
        
        document.getElementById('review').innerHTML = html;
        document.getElementById('review').style.display = 'block';
    }

    function speakModel() {
        const model = levels[current].s + levels[current].t + levels[current].a + levels[current].r;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(model));
    }

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = "Level " + (current + 1) + ": " + levels[current].t;
        document.getElementById('p-sit').innerText = levels[current].s;
        document.getElementById('p-task').innerText = levels[current].t;
        document.getElementById('p-act').innerText = levels[current].a;
        document.getElementById('p-res').innerText = levels[current].r;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
    }
    nextLevel();
</script>
</body>
</html>
