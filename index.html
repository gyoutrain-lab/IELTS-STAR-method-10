<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Consultant: Mastery Audit Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .app-container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin: 15px 0; padding: 15px; background: #f8f9fa; border-left: 5px solid #2c3e50; }
        .placeholder-text { font-size: 0.9em; color: #2c3e50; font-weight: bold; background: #dfe6e9; padding: 5px; border-radius: 4px; display: block; margin-bottom: 5px; }
        textarea { width: 100%; height: 60px; border: 1px solid #ccc; padding: 10px; }
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; }
        .mic-btn { background: #e74c3c; color: white; }
        #review { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; background: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 id="level-title">Level 1: Teaching & Inventing</h2>
    
    <div class="input-group">
        <label>Scene (Nominalization):</label>
        <span class="placeholder-text" id="p-sit"></span>
        <textarea id="sit"></textarea>
        <button class="mic-btn" onclick="startDictation('sit')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Challenge (Complex Conjunction):</label>
        <span class="placeholder-text" id="p-task"></span>
        <textarea id="task"></textarea>
        <button class="mic-btn" onclick="startDictation('task')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Action (Past Progressive + Inversion):</label>
        <span class="placeholder-text" id="p-act"></span>
        <textarea id="act"></textarea>
        <button class="mic-btn" onclick="startDictation('act')">🎤 Voice</button>
    </div>
    <div class="input-group">
        <label>Impact (Academic Hedging):</label>
        <span class="placeholder-text" id="p-res"></span>
        <textarea id="res"></textarea>
        <button class="mic-btn" onclick="startDictation('res')">🎤 Voice</button>
    </div>

    <div class="controls">
        <button onclick="evaluateDrill()">Submit & Score</button>
        <button onclick="nextLevel()">Next Competency</button>
    </div>

    <div id="review"></div>
</div>

<script>
    const levels = [
        { t: "Teaching & Inventing", s: "The pedagogical innovation of nursing education materials involves high-level conceptual design and...", t: "Notwithstanding the intricate complexity of intellectual property and curriculum development...", a: "While I was creating original teaching modules, never had I observed such...", r: "It would be more prudent to conclude that this fosters cognitive acquisition and...", full: "The pedagogical innovation of nursing education materials involves high-level conceptual design and iterative refinement. Notwithstanding the intricate complexity of intellectual property and curriculum development, I successfully launched a new framework. While I was creating original teaching modules, never had I observed such profound student engagement. It would be more prudent to conclude that this fosters cognitive acquisition and long-term professional development." },
        { t: "Working in Australia", s: "The professional clinical landscape in Australia emphasizes evidence-based standards and...", t: "Given the systematic complexity of healthcare delivery and multidisciplinary coordination...", a: "While I was integrating into the Australian workforce, never had I witnessed such...", r: "It would be more substantiated to conclude that this fosters global competency and...", full: "The professional clinical landscape in Australia emphasizes evidence-based standards and high-quality patient outcomes. Given the systematic complexity of healthcare delivery and multidisciplinary coordination, I adapted rapidly. While I was integrating into the Australian workforce, never had I witnessed such collaborative synergy. It would be more substantiated to conclude that this fosters global competency and advanced clinical practice." },
        // ... [Add remaining 12 competencies following this pattern]
    ];

    let current = 0;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let activeField = '';

    function startDictation(id) { activeField = id; recognition.start(); }
    recognition.onresult = (e) => { document.getElementById(activeField).value = e.results[0][0].transcript; };

    function evaluateDrill() {
        const fullAudit = levels[current].full;
        let html = `<h3>Competency Audit: ${levels[current].t}</h3>
                    <p><strong>Professional Full Description (Band 9):</strong><br>${fullAudit}</p>
                    <button onclick="speakModel()">🔊 Listen to Full Description</button>`;
        document.getElementById('review').innerHTML = html;
        document.getElementById('review').style.display = 'block';
    }

    function speakModel() { window.speechSynthesis.speak(new SpeechSynthesisUtterance(levels[current].full)); }

    function nextLevel() {
        current = (current + 1) % levels.length;
        document.getElementById('level-title').innerText = "Level " + (current + 1) + ": " + levels[current].t;
        document.getElementById('p-sit').innerText = levels[current].s;
        document.getElementById('p-task').innerText = levels[current].t;
        document.getElementById('p-act').innerText = levels[current].a;
        document.getElementById('p-res').innerText = levels[current].r;
        document.querySelectorAll('textarea').forEach(t => t.value = '');
        document.getElementById('review').style.display = 'none';
    }
    nextLevel();
</script>
</body>
</html>
